<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebSnaps</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="12" cy="13" r="4" stroke="#a5b4fc" stroke-width="2"/>
        </svg>
        <span>WebSnaps</span>
      </div>
      <a href="#" id="settings-link" class="settings-btn" title="ショートカット設定">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </a>
    </header>

    <!-- Capture Mode Buttons -->
    <div class="section">
      <div class="section-label">キャプチャ範囲</div>
      <div class="capture-grid">
        <button class="capture-btn" data-mode="selection">
          <div class="capture-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M3 3h4M17 3h4M21 7v4M21 17v4M17 21h4M3 21h4M3 7v4M3 17v4"/>
              <rect x="7" y="7" width="10" height="10" stroke-dasharray="2 2"/>
            </svg>
          </div>
          <div class="capture-label">範囲選択</div>
          <div class="capture-shortcut" data-command="capture-selection">Alt+Shift+S</div>
        </button>

        <button class="capture-btn" data-mode="visible">
          <div class="capture-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="2" y="3" width="20" height="14" rx="2"/>
              <path d="M8 21h8M12 17v4"/>
            </svg>
          </div>
          <div class="capture-label">表示範囲</div>
          <div class="capture-shortcut" data-command="capture-visible">Alt+Shift+V</div>
        </button>

        <button class="capture-btn" data-mode="fullpage">
          <div class="capture-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="2" width="18" height="20" rx="2"/>
              <line x1="7" y1="7" x2="17" y2="7"/>
              <line x1="7" y1="11" x2="17" y2="11"/>
              <line x1="7" y1="15" x2="14" y2="15"/>
            </svg>
          </div>
          <div class="capture-label">ページ全体</div>
          <div class="capture-shortcut" data-command="capture-fullpage">Alt+Shift+F</div>
        </button>
      </div>
    </div>

    <!-- Output Settings -->
    <div class="section">
      <div class="section-label">保存形式</div>
      <div class="toggle-group" id="format-group">
        <button class="toggle-btn active" data-value="png">PNG</button>
        <button class="toggle-btn" data-value="jpg">JPG</button>
      </div>
    </div>

    <div class="section">
      <div class="section-label">保存先</div>
      <div class="toggle-group" id="dest-group">
        <button class="toggle-btn active" data-value="file">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          ファイル保存
        </button>
        <button class="toggle-btn" data-value="clipboard">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          クリップボード
        </button>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <a id="shortcuts-link" href="chrome://extensions/shortcuts" target="_blank">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="7" width="20" height="14" rx="2"/>
          <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
          <line x1="12" y1="12" x2="12" y2="16"/>
          <line x1="10" y1="14" x2="14" y2="14"/>
        </svg>
        ショートカットキーをカスタマイズ
      </a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
