<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1400px;height:560px;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.card{width:1400px;height:560px;background:linear-gradient(135deg,#312e81 0%,#4f46e5 35%,#6366f1 65%,#7c3aed 100%);position:relative;overflow:hidden;display:flex;align-items:center;padding:0 100px}

/* Deco */
.deco{position:absolute;border-radius:50%;border:2px solid rgba(255,255,255,0.08)}
.d1{width:600px;height:600px;right:-100px;top:-200px}
.d2{width:420px;height:420px;right:30px;top:-100px}
.d3{width:260px;height:260px;right:120px;top:-20px}
.d4{width:500px;height:500px;left:-200px;bottom:-250px;border-color:rgba(255,255,255,0.05)}

/* Left: branding */
.left{flex:0 0 480px;padding-right:60px}
.brand{font-size:72px;font-weight:900;color:#fff;letter-spacing:-3px;line-height:1;margin-bottom:12px}
.brand span{color:#a5b4fc}
.tagline{font-size:22px;color:rgba(255,255,255,0.75);line-height:1.5;margin-bottom:36px;font-weight:400}
.badge-row{display:flex;gap:10px;flex-wrap:wrap}
.badge{padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600;border:1px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.1);backdrop-filter:blur(8px)}
.badge.highlight{background:rgba(165,243,252,0.2);border-color:rgba(165,243,252,0.4);color:#a5f3fc}

/* Center: feature list */
.center{flex:0 0 360px;padding:0 40px}
.feat-title{font-size:14px;font-weight:700;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:20px}
.feat-item{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px}
.feat-icon{width:36px;height:36px;border-radius:9px;background:rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#a5b4fc;border:1px solid rgba(255,255,255,0.15)}
.feat-text strong{display:block;font-size:15px;font-weight:600;color:#fff;margin-bottom:2px}
.feat-text span{font-size:13px;color:rgba(255,255,255,0.6)}

/* Right: camera icon */
.right{flex:1;display:flex;align-items:center;justify-content:center}
.icon-container{position:relative}
.icon-glow{position:absolute;inset:-30px;background:radial-gradient(circle,rgba(165,180,252,0.3) 0%,transparent 70%);border-radius:50%}
.icon-bg{width:200px;height:200px;background:rgba(255,255,255,0.12);border-radius:48px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.2);backdrop-filter:blur(16px);position:relative;box-shadow:0 24px 80px rgba(0,0,0,0.3)}
</style>
</head>
<body>
<div class="card">
  <div class="deco d1"></div>
  <div class="deco d2"></div>
  <div class="deco d3"></div>
  <div class="deco d4"></div>

  <div class="left">
    <div class="brand">Web<span>Snaps</span></div>
    <div class="tagline">撮る。編集する。<br>すぐ使える。</div>
    <div class="badge-row">
      <div class="badge highlight">Manifest V3</div>
      <div class="badge">Chrome 拡張機能</div>
      <div class="badge">完全無料</div>
    </div>
  </div>

  <div class="center">
    <div class="feat-title">主な機能</div>
    <div class="feat-item">
      <div class="feat-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="4"/></svg>
      </div>
      <div class="feat-text">
        <strong>3種類のキャプチャモード</strong>
        <span>範囲選択・要素選択・ページ全体</span>
      </div>
    </div>
    <div class="feat-item">
      <div class="feat-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>
      </div>
      <div class="feat-text">
        <strong>内蔵エディタで即編集</strong>
        <span>矢印・テキスト・ぼかし・モザイク</span>
      </div>
    </div>
    <div class="feat-item">
      <div class="feat-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </div>
      <div class="feat-text">
        <strong>PNG / JPG・クリップボード</strong>
        <span>用途に合わせた保存オプション</span>
      </div>
    </div>
    <div class="feat-item">
      <div class="feat-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      </div>
      <div class="feat-text">
        <strong>ショートカットキー対応</strong>
        <span>Alt+Shift+S / V / F でワンタッチ</span>
      </div>
    </div>
  </div>

  <div class="right">
    <div class="icon-container">
      <div class="icon-glow"></div>
      <div class="icon-bg">
        <svg width="130" height="130" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="9" y="24" width="82" height="59" rx="11" fill="white"/>
          <rect x="35" y="12" width="30" height="13" rx="7" fill="white"/>
          <circle cx="50" cy="56" r="23.5" fill="white"/>
          <circle cx="50" cy="56" r="14.5" fill="#6366f1"/>
          <circle cx="50" cy="56" r="5.5" fill="white"/>
        </svg>
      </div>
    </div>
  </div>
</div>
</body>
</html>
