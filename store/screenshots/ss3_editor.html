<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1280px;height:800px;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111;display:flex;flex-direction:column}
:root{--bg:#111;--surface:#1a1a1a;--surface2:#222;--border:rgba(255,255,255,0.07);--accent:#6366f1;--text:#f0f0f0;--muted:#888}

/* Header */
.header{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
.logo{font-size:15px;font-weight:700;color:#a5b4fc;letter-spacing:0.5px;margin-right:8px}
.hdr-sep{width:1px;height:24px;background:var(--border)}
.hdr-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border:1px solid var(--border);border-radius:7px;background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit}
.hdr-btn:hover{color:var(--text);background:rgba(255,255,255,0.05)}
.spacer{flex:1}
.format-group{display:flex;background:rgba(255,255,255,0.05);border-radius:7px;padding:2px;border:1px solid var(--border)}
.fmt-btn{padding:4px 12px;border-radius:5px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border:none;background:transparent;font-family:inherit}
.fmt-btn.active{background:var(--accent);color:#fff}
.hdr-action{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border:none}
.btn-copy{background:rgba(255,255,255,0.08);color:var(--text);border:1px solid var(--border)}
.btn-save{background:var(--accent);color:#fff}

/* Layout */
.main{flex:1;display:flex;overflow:hidden}

/* Toolbar */
.toolbar{width:56px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:2px}
.tool-btn{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);border:none;background:transparent;position:relative}
.tool-btn.active{background:rgba(99,102,241,0.2);color:#a5b4fc}
.tool-btn:hover{background:rgba(255,255,255,0.06);color:var(--text)}
.tool-sep{width:28px;height:1px;background:var(--border);margin:4px 0}

/* Workspace */
.workspace{flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;background:repeating-conic-gradient(#1c1c1c 0% 25%,#181818 0% 50%) 0 0/24px 24px}
.canvas-wrap{position:relative;box-shadow:0 0 0 1px rgba(255,255,255,0.1),0 24px 80px rgba(0,0,0,0.8)}
canvas{display:block}

/* Options panel */
.options{width:200px;background:var(--surface);border-left:1px solid var(--border);padding:16px;overflow-y:auto}
.opt-section{margin-bottom:20px}
.opt-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px}
.color-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:10px}
.color-swatch{height:20px;border-radius:4px;cursor:pointer}
.color-swatch.active{outline:2px solid #fff;outline-offset:1px}
.opt-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.opt-label{font-size:12px;color:var(--muted)}
.opt-value{font-size:12px;color:var(--text);font-weight:500}
.slider{width:100%;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;margin-top:4px;position:relative}
.slider-fill{height:100%;background:var(--accent);border-radius:2px}
.slider-thumb{width:12px;height:12px;background:#fff;border-radius:50%;position:absolute;top:-4px;box-shadow:0 1px 4px rgba(0,0,0,0.5)}

/* Status bar */
.statusbar{height:24px;background:rgba(10,10,10,0.8);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:20px;flex-shrink:0}
.status-item{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}
</style>
</head>
<body>
<div class="header">
  <span class="logo">WebSnaps</span>
  <div class="hdr-sep"></div>
  <button class="hdr-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
    元に戻す
  </button>
  <button class="hdr-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 14 20 9 15 4"/><path d="M4 20v-7a4 4 0 0 1 4-4h12"/></svg>
    やり直す
  </button>
  <div class="hdr-sep"></div>
  <button class="hdr-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    100%
  </button>
  <div class="spacer"></div>
  <div class="format-group">
    <button class="fmt-btn active">PNG</button>
    <button class="fmt-btn">JPG</button>
  </div>
  <button class="hdr-action btn-copy">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    コピー
  </button>
  <button class="hdr-action btn-save">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    保存
  </button>
</div>

<div class="main">
  <div class="toolbar">
    <button class="tool-btn" title="選択">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3l14 9-7 1-4 7z"/></svg>
    </button>
    <div class="tool-sep"></div>
    <button class="tool-btn" title="ペン">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>
    </button>
    <button class="tool-btn active" title="矢印">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </button>
    <button class="tool-btn" title="四角形">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
    </button>
    <button class="tool-btn" title="楕円">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="12" rx="10" ry="6"/></svg>
    </button>
    <div class="tool-sep"></div>
    <button class="tool-btn" title="テキスト">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
    </button>
    <div class="tool-sep"></div>
    <button class="tool-btn" title="ぼかし">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
    </button>
    <button class="tool-btn" title="モザイク">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    </button>
    <div class="tool-sep"></div>
    <button class="tool-btn" title="切り抜き">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M1 14h22v1a4 4 0 0 1-4 4H5a4 4 0 0 1-4-4v-1z"/></svg>
    </button>
  </div>

  <div class="workspace">
    <div class="canvas-wrap">
      <svg width="900" height="620" xmlns="http://www.w3.org/2000/svg">
        <!-- Screenshot background (fake webpage) -->
        <rect width="900" height="620" fill="#f8fafc"/>
        <!-- Header -->
        <rect width="900" height="60" fill="white"/>
        <rect x="32" y="20" width="80" height="20" rx="4" fill="#6366f1"/>
        <rect x="160" y="24" width="60" height="12" rx="3" fill="#e5e7eb"/>
        <rect x="232" y="24" width="60" height="12" rx="3" fill="#e5e7eb"/>
        <rect x="304" y="24" width="60" height="12" rx="3" fill="#e5e7eb"/>
        <rect x="780" y="18" width="88" height="24" rx="6" fill="#6366f1"/>
        <!-- Content area -->
        <rect x="32" y="80" width="560" height="300" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1"/>
        <rect x="52" y="100" width="200" height="28" rx="4" fill="#f3f4f6"/>
        <rect x="52" y="138" width="340" height="18" rx="3" fill="#e5e7eb"/>
        <rect x="52" y="164" width="280" height="14" rx="3" fill="#f3f4f6"/>
        <rect x="52" y="186" width="300" height="14" rx="3" fill="#f3f4f6"/>
        <rect x="52" y="208" width="260" height="14" rx="3" fill="#f3f4f6"/>
        <rect x="52" y="240" width="520" height="120" rx="8" fill="linear-gradient(135deg,#6366f1,#8b5cf6)"/>
        <rect x="52" y="240" width="520" height="120" rx="8" fill="#ede9fe"/>
        <rect x="72" y="256" width="140" height="16" rx="3" fill="#c4b5fd"/>
        <rect x="72" y="280" width="200" height="14" rx="3" fill="#ddd6fe"/>
        <rect x="72" y="300" width="180" height="14" rx="3" fill="#ddd6fe"/>
        <!-- Sidebar -->
        <rect x="616" y="80" width="252" height="160" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1"/>
        <rect x="636" y="100" width="100" height="14" rx="3" fill="#e5e7eb"/>
        <rect x="636" y="124" width="212" height="48" rx="6" fill="#f9fafb"/>
        <rect x="636" y="180" width="212" height="48" rx="6" fill="#f9fafb"/>

        <!-- Annotations drawn on top -->
        <!-- Red arrow pointing to sidebar -->
        <defs>
          <marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
          </marker>
        </defs>
        <line x1="580" y1="150" x2="612" y2="150" stroke="#ef4444" stroke-width="2.5" marker-end="url(#ah)"/>

        <!-- Red rectangle highlight around header button -->
        <rect x="776" y="14" width="96" height="32" rx="8" fill="none" stroke="#ef4444" stroke-width="2.5"/>

        <!-- Blur area (gray box simulating blur) -->
        <rect x="636" y="124" width="212" height="48" rx="6" fill="rgba(100,100,100,0.15)"/>
        <g opacity="0.6">
          <rect x="644" y="130" width="40" height="8" rx="2" fill="#aaa"/>
          <rect x="644" y="142" width="60" height="8" rx="2" fill="#aaa"/>
          <rect x="644" y="154" width="50" height="8" rx="2" fill="#aaa"/>
        </g>
        <!-- Blur label badge -->
        <rect x="636" y="113" width="38" height="16" rx="4" fill="#6366f1"/>
        <text x="655" y="125" font-size="9" fill="white" text-anchor="middle" font-family="sans-serif">ぼかし</text>

        <!-- Text annotation -->
        <rect x="300" y="380" width="160" height="30" rx="4" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,2"/>
        <text x="380" y="400" font-size="13" fill="#22c55e" text-anchor="middle" font-weight="600" font-family="sans-serif">ここを確認</text>

        <!-- Another arrow pointing down -->
        <defs>
          <marker id="ah2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
          </marker>
        </defs>
        <line x1="380" y1="415" x2="380" y2="445" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#ah2)"/>

        <!-- Bottom cards -->
        <rect x="32" y="408" width="176" height="100" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1"/>
        <rect x="52" y="424" width="100" height="14" rx="3" fill="#e5e7eb"/>
        <rect x="52" y="446" width="136" height="12" rx="3" fill="#f3f4f6"/>
        <rect x="52" y="464" width="120" height="12" rx="3" fill="#f3f4f6"/>
        <rect x="220" y="408" width="176" height="100" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1"/>
        <rect x="240" y="424" width="100" height="14" rx="3" fill="#e5e7eb"/>
        <rect x="240" y="446" width="136" height="12" rx="3" fill="#f3f4f6"/>
        <rect x="240" y="464" width="120" height="12" rx="3" fill="#f3f4f6"/>
        <rect x="408" y="408" width="176" height="100" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1"/>
        <rect x="428" y="424" width="100" height="14" rx="3" fill="#e5e7eb"/>
        <rect x="428" y="446" width="136" height="12" rx="3" fill="#f3f4f6"/>
        <rect x="428" y="464" width="120" height="12" rx="3" fill="#f3f4f6"/>
      </svg>
    </div>
  </div>

  <div class="options">
    <div class="opt-section">
      <div class="opt-title">カラー</div>
      <div class="color-grid">
        <div class="color-swatch" style="background:#ef4444"></div>
        <div class="color-swatch active" style="background:#f97316"></div>
        <div class="color-swatch" style="background:#eab308"></div>
        <div class="color-swatch" style="background:#22c55e"></div>
        <div class="color-swatch" style="background:#3b82f6"></div>
        <div class="color-swatch" style="background:#a855f7"></div>
        <div class="color-swatch" style="background:#ec4899"></div>
        <div class="color-swatch" style="background:#fff"></div>
        <div class="color-swatch" style="background:#6b7280"></div>
        <div class="color-swatch" style="background:#111"></div>
      </div>
    </div>
    <div class="opt-section">
      <div class="opt-title">線の太さ</div>
      <div class="opt-row"><span class="opt-label">太さ</span><span class="opt-value">3px</span></div>
      <div class="slider"><div class="slider-fill" style="width:35%"></div><div class="slider-thumb" style="left:calc(35% - 6px)"></div></div>
    </div>
    <div class="opt-section">
      <div class="opt-title">不透明度</div>
      <div class="opt-row"><span class="opt-label">不透明度</span><span class="opt-value">100%</span></div>
      <div class="slider"><div class="slider-fill" style="width:100%"></div><div class="slider-thumb" style="left:calc(100% - 12px)"></div></div>
    </div>
  </div>
</div>

<div class="statusbar">
  <div class="status-item">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 10c-.83 0-1.5-.67-1.5-1.5v-5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5z"/><path d="M20.5 10H19V8.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/><path d="M9.5 14c.83 0 1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5S8 21.33 8 20.5v-5c0-.83.67-1.5 1.5-1.5z"/></svg>
    矢印
  </div>
  <div class="status-item">900 × 620</div>
  <div class="status-item">ツール: 矢印</div>
</div>
</body>
</html>
