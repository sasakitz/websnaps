<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1280px;height:800px;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#2d2d2d;display:flex;align-items:flex-start;justify-content:flex-end}

/* Chrome browser chrome mockup */
.browser{width:100%;height:100%;position:relative}
.browser-bar{height:52px;background:#3c3c3c;display:flex;align-items:center;padding:0 16px;gap:8px;border-bottom:1px solid #1a1a1a}
.browser-dots{display:flex;gap:6px}
.dot{width:12px;height:12px;border-radius:50%}
.nav-btn{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;color:#aaa}
.address-bar{flex:1;background:rgba(255,255,255,0.1);border-radius:20px;height:32px;display:flex;align-items:center;padding:0 14px;gap:8px;max-width:600px;margin:0 auto}
.address-text{font-size:13px;color:#ccc}
.tab-bar{height:36px;background:#323232;display:flex;align-items:flex-end;padding:0 8px;gap:0;border-bottom:1px solid #1a1a1a}
.tab{height:30px;background:#f1f1f1;border-radius:8px 8px 0 0;padding:0 16px;display:flex;align-items:center;gap:8px;font-size:12px;color:#333;min-width:160px}
.tab-favicon{width:14px;height:14px;border-radius:3px;background:#6366f1}
.tab-close{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#888;margin-left:auto}
.tab-inactive{background:rgba(255,255,255,0.05);color:#888}
.ext-btn{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;margin-left:4px}

/* Webpage behind */
.webpage{width:100%;height:calc(100% - 124px);background:#f8fafc;position:relative}
.wp-header{background:white;border-bottom:1px solid #e5e7eb;height:60px;display:flex;align-items:center;padding:0 32px;gap:24px}
.wp-logo{font-size:18px;font-weight:800;color:#111}
.wp-nav{display:flex;gap:20px}
.wp-nav span{font-size:13px;color:#6b7280}
.wp-content{padding:32px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
.wp-card{background:white;border-radius:12px;padding:24px;border:1px solid #e5e7eb}
.wp-card-img{height:80px;border-radius:8px;background:linear-gradient(135deg,#ede9fe,#ddd6fe);margin-bottom:16px}
.wp-card-title{width:80%;height:14px;background:#e5e7eb;border-radius:3px;margin-bottom:8px}
.wp-card-text{width:100%;height:10px;background:#f3f4f6;border-radius:3px;margin-bottom:6px}

/* Popup */
.popup-wrap{position:absolute;top:0;right:100px;z-index:100}
.popup-arrow{width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:7px solid #1a1a1a;margin-left:auto;margin-right:20px}
.popup{width:300px;background:#141414;border-radius:14px;border:1px solid rgba(255,255,255,0.08);box-shadow:0 20px 60px rgba(0,0,0,0.8),0 0 0 1px rgba(99,102,241,0.15);overflow:hidden}
.popup-header{padding:16px 18px 12px;border-bottom:1px solid rgba(255,255,255,0.06)}
.popup-logo{font-size:16px;font-weight:700;color:#a5b4fc;letter-spacing:0.5px}
.popup-sub{font-size:11px;color:#555;margin-top:2px}
.capture-btns{padding:12px 12px 8px}
.cap-btn{width:100%;display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);color:#ddd;font-size:13px;font-weight:500;cursor:pointer;margin-bottom:6px;font-family:inherit;transition:all 0.15s;text-align:left}
.cap-btn:hover{background:rgba(99,102,241,0.15);border-color:rgba(99,102,241,0.3);color:#c7d2fe}
.cap-btn-icon{width:34px;height:34px;border-radius:8px;background:rgba(99,102,241,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#a5b4fc}
.cap-btn-info{flex:1}
.cap-btn-title{font-size:13px;font-weight:600;color:#e0e0e0;margin-bottom:2px}
.cap-btn-shortcut{font-size:11px;color:#555;font-family:monospace}
.popup-settings{padding:10px 12px 14px;border-top:1px solid rgba(255,255,255,0.06)}
.setting-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.setting-label{font-size:12px;color:#666}
.toggle-group{display:flex;background:rgba(255,255,255,0.05);border-radius:6px;padding:2px;border:1px solid rgba(255,255,255,0.07)}
.toggle-btn{padding:3px 12px;border-radius:4px;font-size:11px;font-weight:500;color:#555;border:none;background:transparent;cursor:pointer;font-family:inherit}
.toggle-btn.active{background:#6366f1;color:#fff}
.popup-footer{padding:8px 18px 12px;display:flex;justify-content:center}
.footer-link{font-size:11px;color:#444;text-decoration:none;display:flex;align-items:center;gap:4px}
</style>
</head>
<body>
<div class="browser">
  <div class="tab-bar">
    <div class="tab">
      <div class="tab-favicon"></div>
      TechFeed - 最新テクノロジーニュース
      <div class="tab-close">×</div>
    </div>
  </div>
  <div class="browser-bar">
    <div class="browser-dots">
      <div class="dot" style="background:#ff5f57"></div>
      <div class="dot" style="background:#febc2e"></div>
      <div class="dot" style="background:#28c840"></div>
    </div>
    <div class="nav-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></div>
    <div class="nav-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
    <div class="address-bar">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span class="address-text">techfeed.jp/articles/websnaps-review</span>
    </div>
    <div style="display:flex;gap:4px;margin-left:8px">
      <div class="ext-btn" style="background:rgba(99,102,241,0.2);color:#a5b4fc">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </div>
    </div>
  </div>

  <div class="webpage">
    <div class="wp-header">
      <div class="wp-logo">TechFeed</div>
      <nav class="wp-nav"><span>テクノロジー</span><span>デザイン</span><span>開発</span></nav>
    </div>
    <div class="wp-content">
      <div class="wp-card"><div class="wp-card-img"></div><div class="wp-card-title"></div><div class="wp-card-text"></div><div class="wp-card-text" style="width:80%"></div></div>
      <div class="wp-card"><div class="wp-card-img" style="background:linear-gradient(135deg,#fce7f3,#fbcfe8)"></div><div class="wp-card-title"></div><div class="wp-card-text"></div><div class="wp-card-text" style="width:70%"></div></div>
      <div class="wp-card"><div class="wp-card-img" style="background:linear-gradient(135deg,#d1fae5,#a7f3d0)"></div><div class="wp-card-title"></div><div class="wp-card-text"></div><div class="wp-card-text" style="width:90%"></div></div>
    </div>
  </div>

  <!-- Popup -->
  <div class="popup-wrap">
    <div class="popup-arrow"></div>
    <div class="popup">
      <div class="popup-header">
        <div class="popup-logo">WebSnaps</div>
        <div class="popup-sub">スクリーンショットツール</div>
      </div>
      <div class="capture-btns">
        <button class="cap-btn">
          <div class="cap-btn-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="4"/></svg>
          </div>
          <div class="cap-btn-info">
            <div class="cap-btn-title">範囲選択</div>
            <div class="cap-btn-shortcut">Alt+Shift+S</div>
          </div>
        </button>
        <button class="cap-btn">
          <div class="cap-btn-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M8 20h8M12 16v4"/></svg>
          </div>
          <div class="cap-btn-info">
            <div class="cap-btn-title">表示範囲</div>
            <div class="cap-btn-shortcut">Alt+Shift+V</div>
          </div>
        </button>
        <button class="cap-btn">
          <div class="cap-btn-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M2 9h20M2 15h20M9 2v20M15 2v20"/></svg>
          </div>
          <div class="cap-btn-info">
            <div class="cap-btn-title">ページ全体</div>
            <div class="cap-btn-shortcut">Alt+Shift+F</div>
          </div>
        </button>
      </div>
      <div class="popup-settings">
        <div class="setting-row">
          <span class="setting-label">保存形式</span>
          <div class="toggle-group">
            <button class="toggle-btn active">PNG</button>
            <button class="toggle-btn">JPG</button>
          </div>
        </div>
        <div class="setting-row">
          <span class="setting-label">保存先</span>
          <div class="toggle-group">
            <button class="toggle-btn active">ファイル</button>
            <button class="toggle-btn">クリップボード</button>
          </div>
        </div>
      </div>
      <div class="popup-footer">
        <a href="#" class="footer-link">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          ショートカットキーを変更
        </a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
